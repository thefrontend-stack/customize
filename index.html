<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
    <meta name="robots" content="noindex, follow"> <!-- Prevent search engines from indexing this page if needed -->
</head>
<body class="bg-fullscreen d-flex align-items-center justify-content-center text-white">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                
                <div class="glass-card p-5 shadow-lg text-center">
                    
                    <!-- Success Icon -->
                   <!-- Success Icon with Lazy Reveal Animation -->
<div class="mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#198754" class="bi bi-check-circle-fill svg-reveal" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
    </svg>
</div>

                    <h1 class="display-6 fw-bold mb-2">Thank You!</h1>
                    <p class="text-white-50 mb-4">Here are the next steps:</p>
                    <div class="progress" role="progressbar" aria-label="Animated striped example" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
  <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 75%"></div>
</div>
                    <!-- 2-Step Timeline -->
                    <div class="vertical-timeline">
                        
                        <!-- Step 1 -->
                        <div class="timeline-step step-active">
                            <h5 class="fw-semibold mb-1">Quote Received</h5>
                            <p class="text-white-50 small mb-0">Your details are successfully logged into our system.</p>
                        </div>

                        <!-- Step 2 -->
                        <div class="timeline-step">
                            <h5 class="fw-semibold mb-1">Review & Contact</h5>
                            <p class="text-white-50 small mb-0">Our team will review your submission and follow up via the contact form.</p>
                        </div>

                    </div>
                    
                    <!-- Return Button -->
                    <div class="mt-5">
                        <a href="#" class="btn btn-outline-light rounded-pill px-5 py-2 fw-medium">Back to Home</a>
                    </div>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
